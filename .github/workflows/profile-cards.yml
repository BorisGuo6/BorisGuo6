name: Refresh Profile Cards

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/profile-cards.yml"
      - "scripts/generate_profile_cards.py"
      - "tests/test_generate_profile_cards.py"

permissions:
  contents: write

concurrency:
  group: profile-cards
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out profile repository
        uses: actions/checkout@v7

      - name: Run generator tests
        run: python3 -m unittest discover -s tests -v

      - name: Generate profile cards
        env:
          GITHUB_TOKEN: ${{ secrets.PROFILE_TOKEN || secrets.GITHUB_TOKEN }}
        run: python3 scripts/generate_profile_cards.py --username "${{ github.repository_owner }}"

      - name: Commit refreshed cards
        run: |
          git diff --check
          git add assets/profile/github-stats.svg assets/profile/top-languages.svg assets/profile/contribution-mix.svg
          if git diff --cached --quiet; then
            echo "Profile cards are already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Refresh GitHub profile cards"
          git push
